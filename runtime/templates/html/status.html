<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI Flow — 状态总览</title>
  <style>{{CSS}}</style>
</head>
<body>
  <div class="page">
    <header class="page-head">
      <div class="eyebrow">AI Flow — 状态总览</div>
      <h1>项目状态面板</h1>
    </header>

    <section>
      <div class="summary-band">
        <div class="stat-card">
          <div class="stat-num" id="total-count">{{TOTAL}}</div>
          <div class="stat-label">总流程数</div>
        </div>
        <div class="stat-card">
          <div class="stat-num">{{DONE_COUNT}}</div>
          <div class="stat-label">已完成</div>
          <div class="stat-delta flat">终态</div>
        </div>
        <div class="stat-card warn">
          <div class="stat-num">{{IN_PROGRESS_COUNT}}</div>
          <div class="stat-label">进行中</div>
          <div class="stat-delta up">活跃</div>
        </div>
        <div class="stat-card">
          <div class="stat-num">{{AWAITING_COUNT}}</div>
          <div class="stat-label">待审查</div>
          <div class="stat-delta flat">队列</div>
        </div>
      </div>
    </section>

    <section id="status-table">
      <div class="sec-head">
        <span class="num">1</span>
        <h2>流程列表</h2>
      </div>
      <input class="search-bar table-search" data-target="status-data-table" type="text" placeholder="搜索...">
      <table data-sortable id="status-data-table">
        <thead>
          <tr>
            <th>Slug</th>
            <th>状态</th>
            <th>Plan</th>
            <th>Latest Review</th>
            <th>Next Action</th>
            <th>HTML</th>
          </tr>
        </thead>
        <tbody>
          {{ROWS}}
        </tbody>
      </table>
    </section>

    <footer>
      来源: .ai-flow/state/*.json &middot; 生成时间: {{GENERATED_AT}}
    </footer>
  </div>
  <script>{{JS}}</script>
</body>
</html>
